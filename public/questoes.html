<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vestibular+ - Questões</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .questoes-container {
      max-width: 700px;
      margin: 40px auto;
    }

    .questoes-header {
      background: linear-gradient(135deg, #27ae60 0%, #229954 100%);
      color: white;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .questao-card {
      background: white;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 25px;
      margin: 20px 0;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .questao-titulo {
      font-size: 18px;
      font-weight: 600;
      color: #2c3e50;
      margin-bottom: 15px;
    }

    .questao-enunciado {
      font-size: 16px;
      color: #34495e;
      margin-bottom: 20px;
      line-height: 1.6;
    }

    .opcao-group {
      margin: 12px 0;
    }

    .opcao-input {
      margin-right: 10px;
      cursor: pointer;
      width: 18px;
      height: 18px;
    }

    .opcao-label {
      display: inline-flex;
      align-items: center;
      cursor: pointer;
      font-size: 15px;
      color: #2c3e50;
      padding: 8px;
      border-radius: 4px;
      transition: background-color 0.2s;
    }

    .opcao-label:hover {
      background-color: #ecf0f1;
    }

    .resposta-feedback {
      margin-top: 20px;
      padding: 15px;
      border-radius: 4px;
      font-weight: 600;
      display: none;
    }

    .resposta-feedback.acertou {
      background-color: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    .resposta-feedback.errou {
      background-color: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    .btn-verificar {
      background: #27ae60;
      color: white;
      padding: 12px 20px;
      border: none;
      border-radius: 4px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 15px;
    }

    .btn-verificar:hover {
      background: #229954;
    }

    .btn-small {
      padding: 8px 12px;
      font-size: 12px;
      border-radius: 4px;
    }

    .loading, .error-message {
      text-align: center;
      padding: 40px;
      font-size: 16px;
      color: #666;
    }

    .error-message {
      background-color: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
      border-radius: 4px;
      margin: 20px 0;
    }

    .contador {
      font-size: 13px;
      opacity: 0.8;
    }

    .navegacao-questoes {
      display: flex;
      gap: 10px;
      margin-top: 20px;
      justify-content: center;
    }

    .btn-nav {
      padding: 10px 15px;
      font-size: 14px;
      border: 1px solid #bdc3c7;
      background: white;
      border-radius: 4px;
      cursor: pointer;
    }

    .btn-nav:hover:not(:disabled) {
      background: #ecf0f1;
    }

    .btn-nav:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark">V</span>
        <div>
          <h1>Vestibular+</h1>
          <p>Resolva as questões</p>
        </div>
      </div>
      <button id="logoutButton" class="secondary">Sair</button>
    </header>

    <main class="page-content">
      <div class="questoes-container">
        <div class="questoes-header">
          <div>
            <h2 id="topicoNome">Carregando...</h2>
            <p id="contador" class="contador">Questão 1 de 1</p>
          </div>
          <div class="controls">
            <button class="btn-small secondary" onclick="window.history.back()">Voltar</button>
          </div>
        </div>
        <div id="errorMessage" class="error-message" style="display: none;"></div>
        <div id="questoesContainer" class="loading">Carregando questões...</div>
      </div>
    </main>
  </div>

  <!-- React app (uses Babel for JSX in-browser during development) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel" src="/questoes.react.js"></script>
  <!-- legacy script kept as fallback -->
  <script src="/questoes.js"></script>
</body>
</html>
